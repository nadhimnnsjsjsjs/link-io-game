<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LINK.IO | Ultimate Edition</title>
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; }
        #leaderboard { position: absolute; top: 20px; right: 20px; width: 190px; background: rgba(0,0,0,0.7); border: 1px solid #333; color: #00faff; padding: 10px; font-size: 13px; border-radius: 5px; }
        .lb-item { display: flex; justify-content: space-between; margin-bottom: 3px; }
        #killFeed { position: absolute; top: 200px; right: 20px; text-align: right; color: #ff3300; font-weight: bold; font-size: 14px; }
        .fuel-wrap { width: 200px; height: 10px; background: rgba(160,0,255,0.2); border: 2px solid #a0f; margin-top: 8px; border-radius: 5px; }
        #fuelFill { width: 0%; height: 100%; background: #a0f; box-shadow: 0 0 10px #a0f; }
        #deathOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.3); display: none; flex-direction: column; justify-content: center; align-items: center; color: white; font-size: 35px; font-weight: bold; z-index: 100; backdrop-filter: blur(5px); }
    </style>
</head>
<body>
    <div id="deathOverlay">SYSTEM FAILURE: REBOOTING...</div>
    <div id="ui">
        <div style="font-size: 38px; font-weight: 900;" id="scoreLabel">0200</div>
        <div class="fuel-wrap"><div id="fuelFill"></div></div>
    </div>
    <div id="leaderboard"><b>RANKINGS</b><div id="lbList"></div></div>
    <div id="killFeed"></div>
    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const socket = io({ transports: ['websocket'] });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let players = {}, orbs = [], powerOrbs = [], particles = [], floatingTexts = [], killMessages = [];
        let myId = null, isDead = false, worldSize = 4000;
        let camera = { x: 2000, y: 2000, shake: 0 };
        let me = { x: 2000, y: 2000, vx: 0, vy: 0, lastX: 2000, lastY: 2000, trail: [], score: 200, maxTrail: 15, boostFuel: 0, color: '#fff', name: 'Connecting...', lastLvl: 1 };
        let mouse = { x: 0, y: 0, down: false }, spacePressed = false;

        // --- AUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d, v, slide=true) {
            try { if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            if(slide) o.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + d);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e){}
        }
        const sfx = {
            eat: () => playSfx(800, 'sine', 0.1, 0.05),
            boost: () => playSfx(400, 'triangle', 0.3, 0.1),
            slice: () => playSfx(1200, 'sawtooth', 0.2, 0.05),
            death: () => { playSfx(100, 'square', 0.5, 0.2); playSfx(60, 'sine', 0.7, 0.3); },
            lvlUp: () => { playSfx(500, 'sine', 0.4, 0.2, false); setTimeout(()=>playSfx(800, 'sine', 0.5, 0.2, false), 150); }
        };

        // --- SDK ---
        async function init() {
            try {
                const sdk = window.CrazyGames.SDK; await sdk.init();
                const user = await sdk.user.getUser();
                me.name = user ? user.username : (prompt("Name:") || "Guest");
            } catch(e) { me.name = prompt("Name:") || "Guest"; }
            socket.emit('join', { name: me.name });
        }
        init();

        // --- INPUTS ---
        window.onmousedown = () => { if(!isDead) mouse.down = true; };
        window.onmouseup = () => mouse.down = false;
        window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
        window.onkeydown = (e) => { if(e.code === "Space") spacePressed = true; };
        window.onkeyup = (e) => { if(e.code === "Space") spacePressed = false; };

        // --- SOCKETS ---
        socket.on('init', (d) => { players = d.players; orbs = d.orbs; powerOrbs = d.powerOrbs; myId = d.myId; worldSize = d.worldSize; me.color = players[myId].color; });
        socket.on('state', (serverPlayers) => { for(let id in serverPlayers) { if(id !== myId) players[id] = serverPlayers[id]; } });
        socket.on('updateOrbs', (o) => orbs = o);
        socket.on('updatePowerOrbs', (p) => powerOrbs = p);
        socket.on('syncScore', (d) => {
            if(d.playerId === myId) {
                me.score = d.newScore;
                let curLvl = Math.floor(me.score / 1000) + 1;
                if(curLvl > me.lastLvl) { sfx.lvlUp(); me.lastLvl = curLvl; camera.shake = 20; }
            } else if(players[d.playerId]) players[d.playerId].score = d.newScore;
        });
        socket.on('triggerSound', (type) => sfx[type]());
        socket.on('refillBoost', () => { me.boostFuel = 100; sfx.boost(); });
        socket.on('doSlice', (d) => {
            let target = (d.victimId === myId) ? me : players[d.victimId];
            if (target && target.trail) {
                target.trail = target.trail.slice(d.sliceIndex + 1);
                if(d.victimId === myId) me.maxTrail = target.trail.length + 5;
                camera.shake = 15; sfx.slice();
                floatingTexts.push({ x: d.x, y: d.y, text: "+" + d.stolen, life: 1.0 });
                for(let i=0; i<10; i++) particles.push({ x: d.x, y: d.y, color: target.color, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1.0 });
            }
        });
        socket.on('explosion', (d) => { camera.shake = 35; sfx.death(); for(let i=0; i<30; i++) particles.push({ x: d.x, y: d.y, color: d.color, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, life: 1.0 }); });
        socket.on('forceDeath', () => handleDeath());
        socket.on('killMessage', (d) => { killMessages.push({ text: d.killer.toUpperCase() + " SLICED " + d.victim.toUpperCase(), life: 1.0 }); if(killMessages.length > 5) killMessages.shift(); });

        function handleDeath() {
            if(isDead) return; isDead = true;
            document.getElementById('deathOverlay').style.display = 'flex';
            socket.emit('playerDied');
            setTimeout(() => {
                isDead = false; document.getElementById('deathOverlay').style.display = 'none';
                me.x = Math.random()*worldSize; me.y = Math.random()*worldSize;
                me.vx = 0; me.vy = 0; me.score = 200; me.trail = []; me.maxTrail = 15; me.boostFuel = 0; me.lastLvl = 1;
            }, 3000);
        }

        // --- LOOP ---
        function update() {
            if (!isDead && myId) {
                let boosting = spacePressed && me.boostFuel > 0;
                let accel = boosting ? 0.0028 : 0.0006;
                if(boosting) me.boostFuel -= 0.7;
                if (mouse.down) {
                    let wM = { x: mouse.x + camera.x - canvas.width/2, y: mouse.y + camera.y - canvas.height/2 };
                    me.vx += (wM.x - me.x) * accel; me.vy += (wM.y - me.y) * accel;
                }
                let maxS = boosting ? 7.5 : 2.5;
                let spd = Math.hypot(me.vx, me.vy);
                if (spd > maxS) { me.vx = (me.vx/spd)*maxS; me.vy = (me.vy/spd)*maxS; }
                me.vx *= 0.96; me.vy *= 0.96; me.x += me.vx; me.y += me.vy;
                me.x = Math.max(50, Math.min(me.x, worldSize - 50)); me.y = Math.max(50, Math.min(me.y, worldSize - 50));

                if (Math.hypot(me.x - me.lastX, me.y - me.lastY) > 15) {
                    me.trail.push({ x: me.x, y: me.y }); me.lastX = me.x; me.lastY = me.y;
                    if (me.trail.length > me.maxTrail) me.trail.shift();
                }

                for(let id in players) {
                    let p = players[id];
                    if(id !== myId && p.trail) {
                        p.trail.forEach((seg, idx) => {
                            if(Math.hypot(me.x-seg.x, me.y-seg.y) < 25) {
                                if(me.score > p.score) socket.emit('slicePlayer', {victimId: id, sliceIndex: idx});
                                else handleDeath();
                            }
                        });
                    }
                }
                socket.emit('update', { x: me.x, y: me.y, trail: me.trail, score: me.score });
            }
            camera.x += (me.x - camera.x) * 0.1; camera.y += (me.y - camera.y) * 0.1;
            if(camera.shake > 0) camera.shake *= 0.9;
            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; if(p.life <= 0) particles.splice(i, 1); });
            floatingTexts.forEach((t, i) => { t.y -= 1.5; t.life -= 0.02; if(t.life <= 0) floatingTexts.splice(i, 1); });
            killMessages.forEach((m, i) => { m.life -= 0.005; if(m.life <= 0) killMessages.splice(i, 1); });
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            let sx = (Math.random()-0.5)*camera.shake, sy = (Math.random()-0.5)*camera.shake;
            ctx.translate(canvas.width/2 - camera.x + sx, canvas.height/2 - camera.y + sy);
            
            // Grid
            ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
            for(let x=0; x<=worldSize; x+=250) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,worldSize); ctx.stroke(); }
            for(let y=0; y<=worldSize; y+=250) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(worldSize,y); ctx.stroke(); }
            ctx.strokeStyle = '#00faff'; ctx.lineWidth = 25; ctx.strokeRect(0, 0, worldSize, worldSize);

            // Items
            orbs.forEach(o => { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(o.x, o.y, 10, 0, Math.PI*2); ctx.fill(); });
            powerOrbs.forEach(o => { ctx.fillStyle = '#a0f'; ctx.beginPath(); ctx.arc(o.x, o.y, 25, 0, Math.PI*2); ctx.fill(); });

            for (let id in players) {
                let p = (id === myId) ? me : players[id];
                if (id === myId && isDead) continue;
                ctx.beginPath(); ctx.strokeStyle = p.color; ctx.lineWidth = 12 + (p.score / 1500);
                if (p.trail && p.trail.length > 0) { ctx.moveTo(p.trail[0].x, p.trail[0].y); p.trail.forEach(t => ctx.lineTo(t.x, t.y)); ctx.lineTo(p.x, p.y); }
                ctx.stroke();
                let hSize = 18 + (p.score/2000);
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(p.x, p.y, hSize, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "black"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center"; ctx.fillText(Math.floor(p.score), p.x, p.y + 5);
                ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.fillText(p.name, p.x, p.y - hSize - 12);
            }

            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
            floatingTexts.forEach(t => { ctx.globalAlpha = t.life; ctx.fillStyle = "#0f0"; ctx.font = "bold 24px Arial"; ctx.fillText(t.text, t.x, t.y); });
            ctx.restore();

            let all = Object.values(players); all.push(me); all.sort((a,b) => b.score - a.score);
            let lbHtml = ""; all.slice(0, 5).forEach((p, i) => lbHtml += `<div class="lb-item"><span>${i+1}. ${p.name}</span><span>${Math.floor(p.score)}</span></div>`);
            document.getElementById('lbList').innerHTML = lbHtml;
            let kHtml = ""; killMessages.forEach(m => kHtml += `<div style="opacity:${m.life}">${m.text}</div>`);
            document.getElementById('killFeed').innerHTML = kHtml;
            document.getElementById('scoreLabel').innerText = Math.floor(me.score).toString().padStart(4, '0');
            document.getElementById('fuelFill').style.width = me.boostFuel + "%";
        }
        update();
    </script>
</body>
</html>
