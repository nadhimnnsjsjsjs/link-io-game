<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LINK.IO | Optimized</title>
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; }
        #deathOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.3); display: none; flex-direction: column; justify-content: center; align-items: center; color: white; font-size: 30px; z-index: 100; }
    </style>
</head>
<body>
    <div id="deathOverlay">SYSTEM REBOOTING...</div>
    <div id="ui"><h1 id="scoreLabel">0200</h1></div>
    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const socket = io({ transports: ['websocket'] }); // Faster transport
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let players = {}, orbs = [], powerOrbs = [], particles = [], myId = null, isDead = false;
        let worldSize = 4000, camera = { x: 2000, y: 2000, shake: 0 };
        let me = { x: 2000, y: 2000, vx: 0, vy: 0, lastX: 2000, lastY: 2000, trail: [], score: 200, maxTrail: 15, boostFuel: 0, color: '#fff', name: '' };
        let mouse = { x: 0, y: 0, down: false }, spacePressed = false;

        async function init() {
            let n = "Guest";
            try {
                const sdk = window.CrazyGames.SDK; await sdk.init();
                const user = await sdk.user.getUser();
                n = user ? user.username : (prompt("Name:") || "Guest");
            } catch(e) { n = prompt("Name:") || "Guest"; }
            me.name = n;
            socket.emit('join', { name: n });
        }
        init();

        window.onmousedown = () => { if(!isDead) mouse.down = true; };
        window.onmouseup = () => mouse.down = false;
        window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
        window.onkeydown = (e) => { if(e.code === "Space") spacePressed = true; };
        window.onkeyup = (e) => { if(e.code === "Space") spacePressed = false; };

        socket.on('init', (d) => { players = d.players; orbs = d.orbs; powerOrbs = d.powerOrbs; myId = d.myId; worldSize = d.worldSize; me.color = players[myId].color; });
        socket.on('syncScore', (d) => { if(d.playerId === myId) me.score = d.newScore; else if(players[d.playerId]) players[d.playerId].score = d.newScore; });
        socket.on('updateOrbs', (o) => orbs = o);
        socket.on('updatePowerOrbs', (p) => powerOrbs = p);
        socket.on('playerMoved', (p) => { if(p.id !== myId) players[p.id] = p; });
        socket.on('removePlayer', (id) => delete players[id]);
        socket.on('doSlice', (d) => {
            let t = (d.victimId === myId) ? me : players[d.victimId];
            if (t && t.trail) { t.trail = t.trail.slice(d.sliceIndex + 1); if(d.victimId === myId) me.maxTrail = t.trail.length + 5; }
        });
        socket.on('forceDeath', () => handleDeath());

        function handleDeath() {
            if(isDead) return; isDead = true;
            document.getElementById('deathOverlay').style.display = 'flex';
            socket.emit('playerDied');
            setTimeout(() => {
                isDead = false; document.getElementById('deathOverlay').style.display = 'none';
                me.x = Math.random()*worldSize; me.y = Math.random()*worldSize;
                me.vx = 0; me.vy = 0; me.score = 200; me.trail = []; me.maxTrail = 15;
            }, 3000);
        }

        function update() {
            if (!isDead && myId) {
                let boosting = spacePressed && me.boostFuel > 0;
                let accel = boosting ? 0.002 : 0.0006;
                if(boosting) me.boostFuel -= 0.5;

                if (mouse.down) {
                    let wM = { x: mouse.x + camera.x - canvas.width/2, y: mouse.y + camera.y - canvas.height/2 };
                    me.vx += (wM.x - me.x) * accel; me.vy += (wM.y - me.y) * accel;
                }
                
                let maxS = boosting ? 7 : 2.8;
                let spd = Math.hypot(me.vx, me.vy);
                if (spd > maxS) { me.vx = (me.vx/spd)*maxS; me.vy = (me.vy/spd)*maxS; }
                me.vx *= 0.96; me.vy *= 0.96; me.x += me.vx; me.y += me.vy;
                me.x = Math.max(50, Math.min(me.x, worldSize - 50));
                me.y = Math.max(50, Math.min(me.y, worldSize - 50));

                if (Math.hypot(me.x - me.lastX, me.y - me.lastY) > 15) {
                    me.trail.push({ x: me.x, y: me.y });
                    me.lastX = me.x; me.lastY = me.y;
                    // LIMIT TAIL GROWTH HERE
                    if (me.trail.length > me.maxTrail) me.trail.shift();
                    if (me.trail.length > 300) me.trail.shift(); // Hard cap
                }

                // Accurate Collisions
                orbs.forEach(o => { if(Math.hypot(me.x-o.x, me.y-o.y) < 40) socket.emit('eatOrb', o.id); });
                powerOrbs.forEach(o => { if(Math.hypot(me.x-o.x, me.y-o.y) < 50) { socket.emit('eatPowerOrb', o.id); me.boostFuel = 100; } });
                
                for(let id in players) {
                    let p = players[id];
                    if(id !== myId && p.trail) {
                        p.trail.forEach((seg, index) => {
                            if(Math.hypot(me.x-seg.x, me.y-seg.y) < 25) socket.emit('slicePlayer', {victimId: id, sliceIndex: index});
                        });
                    }
                }
                
                // THROTTLE NETWORK: Send update only 30 times per second to stop bugging
                if(Date.now() % 2 === 0) socket.emit('update', { x: me.x, y: me.y, trail: me.trail, score: me.score });
            }
            camera.x += (me.x - camera.x) * 0.1; camera.y += (me.y - camera.y) * 0.1;
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(canvas.width/2 - camera.x, canvas.height/2 - camera.y);
            ctx.strokeStyle = '#00faff'; ctx.lineWidth = 20; ctx.strokeRect(0, 0, worldSize, worldSize);
            orbs.forEach(o => { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(o.x, o.y, 8, 0, Math.PI*2); ctx.fill(); });
            powerOrbs.forEach(o => { ctx.fillStyle = '#a0f'; ctx.beginPath(); ctx.arc(o.x, o.y, 20, 0, Math.PI*2); ctx.fill(); });
            for(let id in players) {
                let p = (id === myId) ? me : players[id];
                if(id === myId && isDead) continue;
                ctx.beginPath(); ctx.strokeStyle = p.color; ctx.lineWidth = 10 + (p.score/2000);
                if(p.trail.length > 0) { ctx.moveTo(p.trail[0].x, p.trail[0].y); p.trail.forEach(t => ctx.lineTo(t.x, t.y)); ctx.lineTo(p.x, p.y); }
                ctx.stroke();
                let s = 16 + (p.score/2000);
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(p.x, p.y, s, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "black"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center"; ctx.fillText(Math.floor(p.score), p.x, p.y+5);
                ctx.fillStyle = "white"; ctx.fillText(p.name, p.x, p.y - s - 10);
            }
            ctx.restore();
            document.getElementById('scoreLabel').innerText = Math.floor(me.score).toString().padStart(4, '0');
        }
        update();
    </script>
</body>
</html>
