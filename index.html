<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LINK.IO | Master Build</title>
    <!-- CrazyGames SDK v3 -->
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        /* UI Elements */
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; user-select: none; z-index: 10; }
        .score-box { font-size: 36px; font-weight: 900; text-shadow: 0 0 10px rgba(0,250,255,0.5); }
        
        #leaderboard { 
            position: absolute; top: 20px; right: 20px; width: 180px; 
            background: rgba(0,0,0,0.6); border: 1px solid #333;
            color: #00faff; padding: 10px; font-size: 13px; border-radius: 4px;
        }
        .lb-item { display: flex; justify-content: space-between; margin-bottom: 3px; }

        #killFeed { 
            position: absolute; top: 180px; right: 20px; text-align: right;
            color: #ff3300; font-weight: bold; font-size: 14px;
        }

        .boost-container { width: 200px; height: 10px; background: rgba(160,0,255,0.2); border: 2px solid #a0f; margin-top: 8px; }
        #boostBar { width: 0%; height: 100%; background: #a0f; box-shadow: 0 0 10px #a0f; }

        #deathOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,0,0,0.2); display: none; flex-direction: column; 
            justify-content: center; align-items: center; color: white; z-index: 100;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="deathOverlay">
        <div style="font-size: 40px; font-weight: bold; letter-spacing: 5px;">SYSTEM REBOOTING</div>
        <div style="font-size: 14px; opacity: 0.7;">RE-ESTABLISHING NEURAL LINK...</div>
    </div>

    <div id="ui">
        <div class="score-box" id="scoreLabel">0200</div>
        <div class="boost-container"><div id="boostBar"></div></div>
    </div>

    <div id="leaderboard">
        <div style="font-weight: bold; border-bottom: 1px solid #444; margin-bottom: 5px;">TOP PILOTS</div>
        <div id="lbList"></div>
    </div>

    <div id="killFeed"></div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const socket = io({ transports: ['websocket'] });
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- GLOBAL STATE ---
        let players = {}, orbs = [], powerOrbs = [], particles = [], floatingTexts = [], killMessages = [];
        let myId = null, isDead = false, worldSize = 4000;
        let camera = { x: 2000, y: 2000, shake: 0 };
        
        let me = {
            x: 2000, y: 2000, vx: 0, vy: 0, lastX: 2000, lastY: 2000,
            trail: [], score: 200, boostFuel: 0, color: '#fff', name: 'Connecting...'
        };

        let mouse = { x: 0, y: 0, down: false }, spacePressed = false;

        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d, v) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + d);
                g.gain.setValueAtTime(v, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e){}
        }

        // --- INITIALIZE ---
        async function init() {
            let n = "Guest";
            try {
                const sdk = window.CrazyGames.SDK;
                await sdk.init();
                const user = await sdk.user.getUser();
                n = user ? user.username : (prompt("Enter Pilot Name:") || "Guest");
            } catch(e) { n = prompt("Enter Pilot Name:") || "Guest"; }
            me.name = n;
            socket.emit('join', { name: n });
        }
        init();

        // --- INPUTS ---
        window.onmousedown = () => { if(!isDead) mouse.down = true; };
        window.onmouseup = () => mouse.down = false;
        window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
        window.onkeydown = (e) => { if(e.code === "Space") spacePressed = true; };
        window.onkeyup = (e) => { if(e.code === "Space") spacePressed = false; };

        // --- SOCKETS ---
        socket.on('init', (d) => {
            players = d.players; orbs = d.orbs; powerOrbs = d.powerOrbs;
            myId = d.myId; worldSize = d.worldSize;
            me.color = players[myId].color;
        });

        socket.on('state', (serverPlayers) => {
            // Update all players EXCEPT for the local one to prevent jitter
            for(let id in serverPlayers) {
                if(id !== myId) players[id] = serverPlayers[id];
            }
        });

        socket.on('updateOrbs', (o) => orbs = o);
        socket.on('updatePowerOrbs', (p) => powerOrbs = p);
        socket.on('removePlayer', (id) => delete players[id]);
        socket.on('syncScore', (d) => { if(d.playerId === myId) me.score = d.newScore; });
        socket.on('refillBoost', () => { me.boostFuel = 100; playSfx(400, 'triangle', 0.4, 0.1); });
        
        socket.on('doSlice', (d) => {
            let target = (d.victimId === myId) ? me : players[d.victimId];
            if (target && target.trail) {
                target.trail = target.trail.slice(d.sliceIndex + 1);
                camera.shake = 15; playSfx(1000, 'sawtooth', 0.2, 0.05);
                floatingTexts.push({ x: d.x, y: d.y, text: "+" + d.stolen, life: 1.0 });
            }
        });

        socket.on('explosion', (d) => {
            camera.shake = 30; playSfx(100, 'square', 0.5, 0.2);
            for(let i=0; i<25; i++) particles.push({ x: d.x, y: d.y, color: d.color, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1.0 });
        });

        socket.on('forceDeath', () => handleDeath());
        socket.on('killMessage', (d) => {
            killMessages.push({ text: d.killer.toUpperCase() + " ASSASSINATED " + d.victim.toUpperCase(), life: 1.0 });
            if(killMessages.length > 5) killMessages.shift();
        });

        function handleDeath() {
            if(isDead) return; isDead = true;
            document.getElementById('deathOverlay').style.display = 'flex';
            socket.emit('playerDied');
            setTimeout(() => {
                isDead = false; document.getElementById('deathOverlay').style.display = 'none';
                me.x = Math.random()*worldSize; me.y = Math.random()*worldSize;
                me.vx = 0; me.vy = 0; me.score = 200; me.trail = []; me.boostFuel = 0;
            }, 3000);
        }

        // --- MAIN LOOP ---
        function update() {
            if (!isDead && myId) {
                let boosting = spacePressed && me.boostFuel > 0;
                let accel = boosting ? 0.0025 : 0.0006;
                if(boosting) me.boostFuel -= 0.7;

                if (mouse.down) {
                    let wM = { x: mouse.x + camera.x - canvas.width/2, y: mouse.y + camera.y - canvas.height/2 };
                    me.vx += (wM.x - me.x) * accel; me.vy += (wM.y - me.y) * accel;
                }
                
                let maxS = boosting ? 7.5 : 2.6;
                let spd = Math.hypot(me.vx, me.vy);
                if (spd > maxS) { me.vx = (me.vx/spd)*maxS; me.vy = (me.vy/spd)*maxS; }
                me.vx *= 0.96; me.vy *= 0.96; me.x += me.vx; me.y += me.vy;
                
                me.x = Math.max(50, Math.min(me.x, worldSize - 50));
                me.y = Math.max(50, Math.min(me.y, worldSize - 50));

                if (Math.hypot(me.x - me.lastX, me.y - me.lastY) > 15) {
                    me.trail.push({ x: me.x, y: me.y });
                    me.lastX = me.x; me.lastY = me.y;
                    // Auto-manage trail length based on score
                    if (me.trail.length > 15 + me.score/100) me.trail.shift();
                }

                // Combat collision (Slicing)
                for(let id in players) {
                    if(id === myId) continue;
                    let p = players[id];
                    if(p.trail) {
                        p.trail.forEach((seg, idx) => {
                            if(Math.hypot(me.x-seg.x, me.y-seg.y) < 25) socket.emit('slicePlayer', {victimId: id, sliceIndex: idx});
                        });
                    }
                }
                socket.emit('update', { x: me.x, y: me.y, trail: me.trail, score: me.score });
            }

            camera.x += (me.x - camera.x) * 0.1;
            camera.y += (me.y - camera.y) * 0.1;
            if(camera.shake > 0) camera.shake *= 0.9;

            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; if(p.life <= 0) particles.splice(i, 1); });
            floatingTexts.forEach((t, i) => { t.y -= 1.5; t.life -= 0.02; if(t.life <= 0) floatingTexts.splice(i, 1); });
            killMessages.forEach((m, i) => { m.life -= 0.005; if(m.life <= 0) killMessages.splice(i, 1); });

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            let sx = (Math.random()-0.5)*camera.shake, sy = (Math.random()-0.5)*camera.shake;
            ctx.translate(canvas.width/2 - camera.x + sx, canvas.height/2 - camera.y + sy);

            // GRID
            ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
            for(let x=0; x<=worldSize; x+=250) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,worldSize); ctx.stroke(); }
            for(let y=0; y<=worldSize; y+=250) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(worldSize,y); ctx.stroke(); }

            // BORDER
            ctx.strokeStyle = '#00faff'; ctx.lineWidth = 25; ctx.strokeRect(0, 0, worldSize, worldSize);

            // ITEMS
            orbs.forEach(o => { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(o.x, o.y, 10, 0, Math.PI*2); ctx.fill(); });
            powerOrbs.forEach(o => { ctx.fillStyle = '#a0f'; ctx.beginPath(); ctx.arc(o.x, o.y, 25, 0, Math.PI*2); ctx.fill(); });

            // PLAYERS
            for (let id in players) {
                let p = (id === myId) ? me : players[id];
                if (id === myId && isDead) continue;

                // Tail
                ctx.beginPath(); ctx.strokeStyle = p.color; ctx.lineWidth = 12 + (p.score / 1500);
                ctx.lineCap = "round"; ctx.lineJoin = "round";
                if (p.trail && p.trail.length > 0) {
                    ctx.moveTo(p.trail[0].x, p.trail[0].y);
                    p.trail.forEach(t => ctx.lineTo(t.x, t.y));
                    ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();

                // Head
                let hSize = 18 + (p.score/2000);
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(p.x, p.y, hSize, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "black"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
                ctx.fillText(Math.floor(p.score), p.x, p.y + 5);
                ctx.fillStyle = "white"; ctx.font = "bold 16px Arial";
                ctx.fillText(p.name, p.x, p.y - hSize - 12);
            }

            // VFX
            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
            floatingTexts.forEach(t => { ctx.globalAlpha = t.life; ctx.fillStyle = "#0f0"; ctx.font = "bold 24px Arial"; ctx.fillText(t.text, t.x, t.y); });
            ctx.globalAlpha = 1;

            ctx.restore();

            // LEADERBOARD
            let all = Object.values(players); all.push(me); all.sort((a,b) => b.score - a.score);
            let lbHtml = ""; all.slice(0, 5).forEach((p, i) => lbHtml += `<div class="lb-item"><span>${i+1}. ${p.name}</span><span>${Math.floor(p.score)}</span></div>`);
            document.getElementById('lbList').innerHTML = lbHtml;

            // KILL FEED
            let kHtml = ""; killMessages.forEach(m => kHtml += `<div style="opacity:${m.life}">${m.text}</div>`);
            document.getElementById('killFeed').innerHTML = kHtml;

            document.getElementById('scoreLabel').innerText = Math.floor(me.score).toString().padStart(4, '0');
            document.getElementById('boostBar').style.width = me.boostFuel + "%";
        }

        update();
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
